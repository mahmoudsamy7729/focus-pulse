openapi: 3.1.0
info:
  title: FocusPulse CSV Import API
  version: 0.1.0
  description: Phase 2 contract for CSV import preview, confirmed import execution, status, and row outcomes.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /imports/csv/preview:
    post:
      summary: Preview a CSV import without creating records
      operationId: previewCsvImport
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 10, window: 1 minute }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Preview generated; no ImportRun or tracking records are created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportPreviewSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /imports/csv:
    post:
      summary: Confirm and enqueue a CSV import
      operationId: createCsvImport
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 5, window: 1 minute }
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, minLength: 8, maxLength: 128 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "202":
          description: Import accepted for background processing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportAcceptedSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /imports:
    get:
      summary: List import runs
      operationId: listImportRuns
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Import run page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRunListSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
  /imports/{import_run_id}:
    get:
      summary: Get import run status and counts
      operationId: getImportRun
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ImportRunId"
      responses:
        "200":
          description: Import run status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRunSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /imports/{import_run_id}/row-outcomes:
    get:
      summary: List invalid, skipped, and failed row outcomes for an import run
      operationId: listImportRowOutcomes
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ImportRunId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Import row outcome page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportRowOutcomeListSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ImportRunId:
      name: import_run_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    ValidationError:
      description: Invalid CSV, request, or row data.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    AuthError:
      description: Authentication required or invalid.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    PermissionError:
      description: Authenticated user lacks the required import scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ConflictError:
      description: Duplicate idempotency key or conflicting import request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    RateLimitError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFoundError:
      description: Import run not found for the current owner.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message, details]
          properties:
            code: { type: string, examples: [CSV_VALIDATION_ERROR] }
            message: { type: string }
            details: { type: object }
    ImportPreviewSuccess:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: { $ref: "#/components/schemas/ImportPreview" }
    ImportAcceptedSuccess:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          required: [import_run_id, status]
          properties:
            import_run_id: { type: string, format: uuid }
            status: { $ref: "#/components/schemas/RunStatus" }
    ImportRunSuccess:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: { $ref: "#/components/schemas/ImportRun" }
    ImportRunListSuccess:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: { $ref: "#/components/schemas/ImportRunPage" }
    ImportRowOutcomeListSuccess:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: { $ref: "#/components/schemas/ImportRowOutcomePage" }
    ImportPreview:
      type: object
      required: [source_name, total_rows, valid_row_count, invalid_row_count, valid_rows, invalid_rows]
      properties:
        source_name: { type: string }
        total_rows: { type: integer, minimum: 0 }
        valid_row_count: { type: integer, minimum: 0 }
        invalid_row_count: { type: integer, minimum: 0 }
        valid_rows:
          type: array
          items: { $ref: "#/components/schemas/NormalizedImportRow" }
        invalid_rows:
          type: array
          items: { $ref: "#/components/schemas/InvalidImportRow" }
        warnings:
          type: array
          items: { type: string }
    NormalizedImportRow:
      type: object
      required: [row_number, date, task, category, time_spent_minutes, tags, notes]
      properties:
        row_number: { type: integer, minimum: 1 }
        date: { type: string, format: date }
        task: { type: string }
        category: { type: string }
        time_spent_minutes: { type: integer, minimum: 1 }
        tags:
          type: array
          items: { type: string }
        notes:
          type: [string, "null"]
    InvalidImportRow:
      type: object
      required: [row_number, reasons]
      properties:
        row_number: { type: integer, minimum: 1 }
        reasons:
          type: array
          items: { type: string }
        row_snapshot: { type: object }
    RunStatus:
      type: string
      enum: [pending, processing, completed, completed_with_errors, failed]
    ImportRun:
      type: object
      required: [id, source_type, source_name, status, processed_row_count, inserted_row_count, invalid_row_count, skipped_row_count, failed_row_count]
      properties:
        id: { type: string, format: uuid }
        source_type: { type: string, enum: [csv] }
        source_name: { type: string }
        status: { $ref: "#/components/schemas/RunStatus" }
        started_at: { type: [string, "null"], format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
        processed_row_count: { type: integer, minimum: 0 }
        inserted_row_count: { type: integer, minimum: 0 }
        invalid_row_count: { type: integer, minimum: 0 }
        skipped_row_count: { type: integer, minimum: 0 }
        failed_row_count: { type: integer, minimum: 0 }
        failure_reason: { type: [string, "null"] }
    ImportRowOutcome:
      type: object
      required: [id, import_run_id, outcome_type, reason]
      properties:
        id: { type: string, format: uuid }
        import_run_id: { type: string, format: uuid }
        row_number: { type: [integer, "null"], minimum: 1 }
        outcome_type: { type: string, enum: [invalid, skipped, failed] }
        reason: { type: string }
        normalized_task_name: { type: [string, "null"] }
        log_date: { type: [string, "null"], format: date }
        time_spent_minutes: { type: [integer, "null"], minimum: 1 }
        row_snapshot: { type: [object, "null"] }
    ImportRunPage:
      type: object
      required: [page, limit, items]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/ImportRun" }
    ImportRowOutcomePage:
      type: object
      required: [page, limit, items]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/ImportRowOutcome" }
