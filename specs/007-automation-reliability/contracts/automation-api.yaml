openapi: 3.1.0
info:
  title: FocusPulse Automation & Reliability API
  version: 0.1.0
  description: Phase 6 contract for backend schedule management, scheduled import history, scheduled AI analysis history, manual triggers, and reliability outcomes.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /imports/schedules:
    post:
      summary: Create a scheduled CSV import
      operationId: createImportSchedule
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 10, window: 1 minute }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportScheduleCreateRequest" }
      responses:
        "201":
          description: Import schedule created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportScheduleSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
    get:
      summary: List import schedules
      operationId: listImportSchedules
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: state
          in: query
          required: false
          schema: { $ref: "#/components/schemas/ScheduleState" }
      responses:
        "200":
          description: Paginated import schedules.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSchedulePageSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /imports/schedules/{schedule_id}:
    get:
      summary: Get an import schedule
      operationId: getImportSchedule
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Import schedule detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportScheduleSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      summary: Update, pause, or resume an import schedule
      operationId: updateImportSchedule
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 20, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportScheduleUpdateRequest" }
      responses:
        "200":
          description: Import schedule updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportScheduleSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
    delete:
      summary: Soft-delete an import schedule
      operationId: deleteImportSchedule
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 10, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Import schedule deleted from active use.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteScheduleSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /imports/schedules/{schedule_id}/trigger:
    post:
      summary: Manually trigger the latest due import schedule window
      operationId: triggerImportSchedule
      security:
        - bearerAuth: [imports:write]
      x-rate-limit: { limit: 5, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Import schedule window accepted or existing run reused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportAutomationRunSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /imports/schedules/{schedule_id}/runs:
    get:
      summary: List scheduled import run history
      operationId: listImportScheduleRuns
      security:
        - bearerAuth: [imports:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/RunStatus"
        - $ref: "#/components/parameters/RunOutcome"
      responses:
        "200":
          description: Paginated scheduled import run history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportAutomationRunPageSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /ai-insights/analysis-schedules:
    post:
      summary: Create a scheduled AI analysis
      operationId: createAIAnalysisSchedule
      security:
        - bearerAuth: [ai_insights:write]
      x-rate-limit: { limit: 10, window: 1 minute }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AIAnalysisScheduleCreateRequest" }
      responses:
        "201":
          description: AI analysis schedule created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisScheduleSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
    get:
      summary: List AI analysis schedules
      operationId: listAIAnalysisSchedules
      security:
        - bearerAuth: [ai_insights:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: state
          in: query
          required: false
          schema: { $ref: "#/components/schemas/ScheduleState" }
      responses:
        "200":
          description: Paginated AI analysis schedules.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisSchedulePageSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /ai-insights/analysis-schedules/{schedule_id}:
    get:
      summary: Get an AI analysis schedule
      operationId: getAIAnalysisSchedule
      security:
        - bearerAuth: [ai_insights:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: AI analysis schedule detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisScheduleSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      summary: Update, pause, or resume an AI analysis schedule
      operationId: updateAIAnalysisSchedule
      security:
        - bearerAuth: [ai_insights:write]
      x-rate-limit: { limit: 20, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AIAnalysisScheduleUpdateRequest" }
      responses:
        "200":
          description: AI analysis schedule updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisScheduleSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
    delete:
      summary: Soft-delete an AI analysis schedule
      operationId: deleteAIAnalysisSchedule
      security:
        - bearerAuth: [ai_insights:write]
      x-rate-limit: { limit: 10, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: AI analysis schedule deleted from active use.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteScheduleSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
  /ai-insights/analysis-schedules/{schedule_id}/trigger:
    post:
      summary: Manually trigger the latest due AI analysis schedule window
      operationId: triggerAIAnalysisSchedule
      security:
        - bearerAuth: [ai_insights:write]
      x-rate-limit: { limit: 5, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: AI analysis schedule window accepted or existing run reused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisAutomationRunSuccess" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
  /ai-insights/analysis-schedules/{schedule_id}/runs:
    get:
      summary: List scheduled AI analysis run history
      operationId: listAIAnalysisScheduleRuns
      security:
        - bearerAuth: [ai_insights:read]
      x-rate-limit: { limit: 60, window: 1 minute }
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/RunStatus"
        - $ref: "#/components/parameters/RunOutcome"
      responses:
        "200":
          description: Paginated scheduled AI analysis run history.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIAnalysisAutomationRunPageSuccess" }
        "401": { $ref: "#/components/responses/AuthError" }
        "403": { $ref: "#/components/responses/PermissionError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "429": { $ref: "#/components/responses/RateLimitError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ScheduleId:
      name: schedule_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    RunStatus:
      name: status
      in: query
      required: false
      schema: { $ref: "#/components/schemas/RunStatus" }
    RunOutcome:
      name: outcome
      in: query
      required: false
      schema: { $ref: "#/components/schemas/ScheduleRunOutcome" }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 8, maxLength: 128 }
  responses:
    ValidationError:
      description: Invalid schedule request or target window.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    AuthError:
      description: Authentication required or invalid.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    PermissionError:
      description: Authenticated user lacks the required scope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ConflictError:
      description: Duplicate schedule window, conflicting schedule state, or idempotency conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    RateLimitError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFoundError:
      description: Schedule or run not found for the current owner.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: { type: object }
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
    PageMeta:
      type: object
      required: [page, limit, total]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
    ScheduleState:
      type: string
      enum: [active, paused, deleted]
    ScheduleCadence:
      type: string
      enum: [daily, weekly]
    RunStatus:
      type: string
      enum: [pending, processing, completed, completed_with_errors, failed]
    ScheduleRunOutcome:
      type: string
      enum: [started, completed, completed_with_errors, failed, skipped, no_new_data, no_data]
    ImportScheduleCreateRequest:
      type: object
      required: [cadence, local_run_time, timezone, source_reference, source_name]
      properties:
        cadence: { $ref: "#/components/schemas/ScheduleCadence" }
        local_run_time: { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        source_name: { type: string, minLength: 1, maxLength: 255 }
        source_reference:
          type: object
          description: Configured CSV source reference metadata. Must not contain raw CSV contents.
          additionalProperties: true
        state: { $ref: "#/components/schemas/ScheduleState" }
    ImportScheduleUpdateRequest:
      type: object
      properties:
        cadence: { $ref: "#/components/schemas/ScheduleCadence" }
        local_run_time: { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        source_name: { type: string, minLength: 1, maxLength: 255 }
        source_reference: { type: object, additionalProperties: true }
        state: { type: string, enum: [active, paused] }
    AIAnalysisScheduleCreateRequest:
      type: object
      required: [target_period_type, cadence, local_run_time, timezone]
      properties:
        target_period_type: { type: string, enum: [daily, weekly] }
        cadence: { $ref: "#/components/schemas/ScheduleCadence" }
        local_run_time: { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        state: { $ref: "#/components/schemas/ScheduleState" }
    AIAnalysisScheduleUpdateRequest:
      type: object
      properties:
        target_period_type: { type: string, enum: [daily, weekly] }
        cadence: { $ref: "#/components/schemas/ScheduleCadence" }
        local_run_time: { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        state: { type: string, enum: [active, paused] }
    ScheduleBase:
      type: object
      required: [id, owner_id, state, cadence, local_run_time, timezone, next_run_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        state: { $ref: "#/components/schemas/ScheduleState" }
        cadence: { $ref: "#/components/schemas/ScheduleCadence" }
        local_run_time: { type: string }
        timezone: { type: string }
        next_run_at: { type: string, format: date-time }
        last_run_at: { type: string, format: date-time, nullable: true }
        last_run_outcome: { $ref: "#/components/schemas/ScheduleRunOutcome" }
        failure_summary: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ImportSchedule:
      allOf:
        - $ref: "#/components/schemas/ScheduleBase"
        - type: object
          required: [source_name, source_reference]
          properties:
            source_name: { type: string }
            source_reference: { type: object, additionalProperties: true }
    AIAnalysisSchedule:
      allOf:
        - $ref: "#/components/schemas/ScheduleBase"
        - type: object
          required: [target_period_type, period_rule]
          properties:
            target_period_type: { type: string, enum: [daily, weekly] }
            period_rule: { type: string, enum: [previous_day, last_completed_week] }
    AutomationRunBase:
      type: object
      required: [id, schedule_id, owner_id, due_at, status, outcome, attempt_count, created_at]
      properties:
        id: { type: string, format: uuid }
        schedule_id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        due_at: { type: string, format: date-time }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/RunStatus" }
        outcome: { $ref: "#/components/schemas/ScheduleRunOutcome" }
        attempt_count: { type: integer, minimum: 0, maximum: 3 }
        max_attempts: { type: integer, minimum: 1, maximum: 3 }
        failure_classification: { type: string, enum: [retryable, non_retryable, exhausted], nullable: true }
        failure_reason: { type: string, nullable: true }
        request_id: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        diagnostic_prunable_after: { type: string, format: date-time }
        diagnostic_pruned_at: { type: string, format: date-time, nullable: true }
        final_summary: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    ImportAutomationRun:
      allOf:
        - $ref: "#/components/schemas/AutomationRunBase"
        - type: object
          properties:
            import_run_id: { type: string, format: uuid, nullable: true }
            source_fingerprint: { type: string, nullable: true }
            row_counts:
              type: object
              properties:
                processed: { type: integer, minimum: 0 }
                inserted: { type: integer, minimum: 0 }
                invalid: { type: integer, minimum: 0 }
                skipped: { type: integer, minimum: 0 }
                failed: { type: integer, minimum: 0 }
    AIAnalysisAutomationRun:
      allOf:
        - $ref: "#/components/schemas/AutomationRunBase"
        - type: object
          properties:
            ai_insight_run_id: { type: string, format: uuid, nullable: true }
            target_period_type: { type: string, enum: [daily, weekly] }
            period_start: { type: string, format: date }
            period_end: { type: string, format: date }
            output_outcome: { type: string, nullable: true }
    ImportScheduleSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [schedule]
              properties:
                schedule: { $ref: "#/components/schemas/ImportSchedule" }
    AIAnalysisScheduleSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [schedule]
              properties:
                schedule: { $ref: "#/components/schemas/AIAnalysisSchedule" }
    ImportSchedulePageSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, meta]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/ImportSchedule" } }
                meta: { $ref: "#/components/schemas/PageMeta" }
    AIAnalysisSchedulePageSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, meta]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/AIAnalysisSchedule" } }
                meta: { $ref: "#/components/schemas/PageMeta" }
    ImportAutomationRunSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [run]
              properties:
                run: { $ref: "#/components/schemas/ImportAutomationRun" }
                reused_existing: { type: boolean, default: false }
    AIAnalysisAutomationRunSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [run]
              properties:
                run: { $ref: "#/components/schemas/AIAnalysisAutomationRun" }
                reused_existing: { type: boolean, default: false }
    ImportAutomationRunPageSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, meta]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/ImportAutomationRun" } }
                meta: { $ref: "#/components/schemas/PageMeta" }
    AIAnalysisAutomationRunPageSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [items, meta]
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/AIAnalysisAutomationRun" } }
                meta: { $ref: "#/components/schemas/PageMeta" }
    DeleteScheduleSuccess:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [deleted]
              properties:
                deleted: { type: boolean, const: true }
                schedule_id: { type: string, format: uuid }
